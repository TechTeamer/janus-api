name: Common

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        required: true
      run_build:
        type: boolean
        required: false
        default: false
      run_release:
        type: boolean
        required: false
        default: false
      dist_dir:
        type: string
        required: false
        default: dist
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Lint
        run: yarn test 2>&1 | tee lint-results.txt
      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: lint-results.txt

  # test:
